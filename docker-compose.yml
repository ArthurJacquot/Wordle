services:
  proxy:
    build: ./frontend
    container_name: proxy-wordle
    ports:
      - "80:80"
    restart: always
    volumes:
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./frontend/wordle-front:/app
      - /app/node_modules
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend
