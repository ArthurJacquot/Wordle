services:
  proxy:
    image: nginx:1.28.1-alpine
    container_name: proxy-wordle-dev
    ports:
      - "80:80"
    restart: unless-stopped
    volumes:
      - ./dev.nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: wordle-dev
    # ports:
    #   - 5173:5173
    volumes:
      - ./frontend/wordle-front:/app
      - /app/node_modules

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend
